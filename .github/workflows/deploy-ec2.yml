name: Deploy EC2 MVP

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: dev
  push:
    branches:
      - dev

concurrency:
  group: clever-delivery-server-ec2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DEPLOY_REF: ${{ github.event.inputs.ref || github.ref_name }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
      REPO_URL: https://github.com/EVNSolution/clever-delivery-server.git
    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          set -euo pipefail
          test -n "$EC2_HOST"
          test -n "$EC2_USER"
          test -n "${{ secrets.EC2_SSH_KEY }}"
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/clever-delivery-ec2.pem
          chmod 600 ~/.ssh/clever-delivery-ec2.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/clever-delivery-ec2.pem "$EC2_USER@$EC2_HOST" \
            "DEPLOY_REF='$DEPLOY_REF' REPO_URL='$REPO_URL' APP_DIR='${EC2_APP_DIR:-/srv/clever-delivery-server}' bash -s" \
            < scripts/deploy-ec2.sh
